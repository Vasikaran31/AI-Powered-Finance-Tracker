services:
  - type: web
    name: ai-finance-tracker
    runtime: node
    plan: free
    buildCommand: npm run render:build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: OPENAI_API_KEY
        sync: false
      - key: PORT
        value: 5001
